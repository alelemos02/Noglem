# Local development stack: PostgreSQL + Redis + PATEC API + Celery Worker
# Usage: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: patec
      POSTGRES_PASSWORD: patec
      POSTGRES_DB: patec
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patec -d patec"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://patec:patec@postgres:5432/patec
      DATABASE_URL_SYNC: postgresql+psycopg2://patec:patec@postgres:5432/patec
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python run.py"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://patec:patec@postgres:5432/patec
      DATABASE_URL_SYNC: postgresql+psycopg2://patec:patec@postgres:5432/patec
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info --concurrency=2

volumes:
  pgdata:
